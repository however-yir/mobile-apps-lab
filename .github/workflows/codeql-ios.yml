name: CodeQL (iOS)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '20 2 * * 2'

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      PROJECT_PATH: ios/Edhita.xcodeproj
      SCHEME: Edhita
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Resolve simulator destination
        run: |
          SIMULATOR_ID="$(xcrun simctl list devices available \
            | grep -m1 -E 'iPhone .*\([0-9A-Fa-f-]{36}\)' \
            | sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/')"
          if [ -z "$SIMULATOR_ID" ]; then
            echo "::error::No available iPhone simulator found on runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "DESTINATION=platform=iOS Simulator,id=$SIMULATOR_ID" >> "$GITHUB_ENV"
          echo "Using destination: platform=iOS Simulator,id=$SIMULATOR_ID"

      - name: Build for CodeQL
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath ios/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
