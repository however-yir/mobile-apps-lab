name: Bug Report
description: Report a reproducible issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include exact steps, inputs, and environment.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device, OS version, app version/commit.
      placeholder: |
        - Device: iPhone 15 / Pixel 8
        - OS: iOS 18.1 / Android 14
        - App version: v1.0.0 or commit SHA
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or attach screenshots.
    validations:
      required: false
